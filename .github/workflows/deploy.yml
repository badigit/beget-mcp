name: Deploy beget-mcp

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/beget-mcp && git pull --ff-only
            cd /opt/mcp-gateway && docker compose up -d --build beget-mcp
            docker compose restart mcpproxy-go
